name: Deploy to VPS

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  set-flavor:
    runs-on: ubuntu-latest
    outputs:
      flavor: ${{ steps.set.outputs.flavor }}
      deploy_path: ${{ steps.set.outputs.deploy_path }}
    steps:
      - name: Set flavor
        id: set
        run: |
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          case "${{ github.ref_name }}" in
            main)
              echo "flavor=prod" >> "$GITHUB_OUTPUT"
              echo "deploy_path=/opt/${REPO_NAME}-prod" >> "$GITHUB_OUTPUT"
              ;;
            staging)
              echo "flavor=stag" >> "$GITHUB_OUTPUT"
              echo "deploy_path=/opt/${REPO_NAME}-stag" >> "$GITHUB_OUTPUT"
              ;;
          esac

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"
      - run: pip install "./backend[dev]"
      - run: ruff check src/
        working-directory: ./backend

  type_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"
      - run: pip install "./backend[dev]"
      - run: mypy src/
        working-directory: ./backend

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: biglands_test
        ports:
          - 5445:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: "backend/pyproject.toml"
      - run: pip install "./backend[dev]"
      - run: pytest tests/
        working-directory: ./backend
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"

  setup_vps:
    if: github.event_name == 'push' && needs.set-flavor.outputs.flavor != ''
    needs: [set-flavor]
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'stag' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOMAIN_NAME }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            DEPLOY_PATH=${{ needs.set-flavor.outputs.deploy_path }}

            # Install dependencies
            if ! command -v nginx &>/dev/null; then
              sudo apt update && sudo apt install -y nginx
            fi
            if ! command -v certbot &>/dev/null; then
              sudo apt install -y certbot python3-certbot-nginx
            fi
            if ! command -v docker &>/dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker ${{ secrets.VPS_USER }}
            fi

            # Create project root
            sudo mkdir -p "$DEPLOY_PATH"
            sudo chown -R ${{ secrets.VPS_USER }}:www-data "$DEPLOY_PATH"

            # Write env file
            echo "${{ secrets.ENV_FILE }}" | base64 -d > "$DEPLOY_PATH/.env"

  build:
    if: github.event_name == 'push'
    needs: [lint, type_check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  config-proxy:
    if: github.event_name == 'push' && needs.set-flavor.outputs.flavor != ''
    needs: [setup_vps, set-flavor]
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'stag' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DOMAIN_NAME }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          source: "deploy/nginx/backend-nginx.conf"
          target: "/tmp"
          overwrite: true

      - name: Configure SSL and nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOMAIN_NAME }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_PATH=${{ needs.set-flavor.outputs.deploy_path }}
            DOMAIN="${{ secrets.DOMAIN_NAME }}"

            APP_PORT=$(grep '^APP_PORT=' "$DEPLOY_PATH/.env" | cut -d= -f2-)
            DATA_DIR=$(grep '^DATA_DIR=' "$DEPLOY_PATH/.env" | cut -d= -f2-)
            DATA_DIR="${DATA_DIR:-.data}"
            UPLOAD_DIR="$DEPLOY_PATH/$DATA_DIR/uploads"

            TARGET_CONF="/etc/nginx/conf.d/$DOMAIN.conf"

            # SSL
            if [ ! -d "/etc/letsencrypt/live/$DOMAIN" ]; then
              sudo systemctl stop nginx 2>/dev/null || true
              sudo certbot certonly --standalone \
                -d "$DOMAIN" --non-interactive --agree-tos \
                --email "${{ secrets.CERTBOT_EMAIL }}" --keep-until-expiring
              sudo systemctl start nginx || true
            fi

            # Auto-renew cron
            if ! sudo crontab -l 2>/dev/null | grep -q "certbot renew"; then
              (sudo crontab -l 2>/dev/null; echo '0 6 * * * certbot renew --quiet --deploy-hook "systemctl reload nginx"') | sudo crontab -
            fi

            # Backup existing config
            if [ -f "$TARGET_CONF" ]; then
              sudo cp "$TARGET_CONF" "$TARGET_CONF.bak"
            fi

            # Write new config
            cp /tmp/deploy/nginx/backend-nginx.conf /tmp/nginx.conf
            sed -i "s/__DOMAIN__/$DOMAIN/g; s/__APP_PORT__/${APP_PORT}/g; s|__UPLOAD_DIR__|${UPLOAD_DIR}|g" /tmp/nginx.conf
            sudo cp /tmp/nginx.conf "$TARGET_CONF"

            # Test, reload, or rollback
            if sudo nginx -t; then
              sudo systemctl reload nginx
            else
              echo "nginx config test failed — restoring backup"
              if [ -f "$TARGET_CONF.bak" ]; then
                sudo cp "$TARGET_CONF.bak" "$TARGET_CONF"
                echo "backup restored"
              else
                sudo rm -f "$TARGET_CONF"
                echo "no backup to restore — removed broken config"
              fi
              exit 1
            fi

  deploy-app:
    if: github.event_name == 'push' && needs.set-flavor.outputs.flavor != ''
    needs: [setup_vps, set-flavor, build]
    environment:
      name: ${{ github.ref_name == 'main' && 'prod' || 'stag' }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOMAIN_NAME }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          script: |
            set -e
            DEPLOY_PATH=${{ needs.set-flavor.outputs.deploy_path }}
            PROJECT_NAME=$(basename "$DEPLOY_PATH")

            curl -sL -H "Authorization: token ${{ secrets.GHCR_TOKEN }}" \
              "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/backend/docker-compose.yml" \
              -o "$DEPLOY_PATH/docker-compose.yml"

            cd "$DEPLOY_PATH"

            DATA_DIR=$(grep '^DATA_DIR=' ".env" | cut -d= -f2-)
            DATA_DIR="${DATA_DIR:-.data}"
            sudo chown -R 999:999 "$DATA_DIR" 2>/dev/null || true

            docker compose -p "$PROJECT_NAME" --profile production --env-file "$DEPLOY_PATH/.env" down || true
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker compose -p "$PROJECT_NAME" --profile production --env-file "$DEPLOY_PATH/.env" pull app
            docker compose -p "$PROJECT_NAME" --profile production --env-file "$DEPLOY_PATH/.env" up -d
            docker image prune -f
