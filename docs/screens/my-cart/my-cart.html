    <!-- Application Logic Script -->
    <script>
        var activeTab = 'all';
        var searchQuery = '';

        var currentPage = 1;
        var itemsPerPage = 10;

        // Toggle Expandable Filters
        function toggleFilterPanel() {
            const panel = document.getElementById('filter-panel');
            panel.classList.toggle('hidden');
        }

        // ===================== CRMFilter Component =====================
        var CRMFilter = class {
            constructor(containerSelector, configFilters, options = {}) {
                this.container = document.querySelector(containerSelector);
                if (!this.container) {
                    console.error('CRMFilter: Container not found');
                    return;
                }
                this.stateFilters = JSON.parse(JSON.stringify(configFilters));
                this.options = Object.assign({ onChange: null, onToast: null }, options);
                this.openPopoverId = null;
                this.instanceId = 'crm-filter-' + Math.random().toString(36).substr(2, 9);
                this._initLayout();
                this._bindGlobalEvents();
                this.render();
            }

            _initLayout() {
                this.container.className = 'block';
                this.container.innerHTML = `
                    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="${this.instanceId}-grid"></div>
                `;
            }

            _bindGlobalEvents() {
                document.addEventListener('click', (e) => {
                    if (!this.container.contains(e.target)) {
                        if (this.openPopoverId !== null) {
                            this.openPopoverId = null;
                            this.render();
                        }
                    }
                });
            }

            render() {
                const gridContainer = document.getElementById(this.instanceId + '-grid');
                if (!gridContainer) return;
                gridContainer.innerHTML = '';

                this.stateFilters.forEach((filter, index) => {
                    const colDiv = document.createElement('div');
                    colDiv.className = 'relative flex flex-col';

                    const labelEl = document.createElement('label');
                    labelEl.className = 'text-xs font-semibold text-textSecondary mb-2 flex items-center justify-between';
                    labelEl.innerHTML = '<span>' + filter.label + '</span>';
                    colDiv.appendChild(labelEl);

                    const triggerBtn = document.createElement('button');
                    triggerBtn.type = 'button';
                    triggerBtn.className = 'w-full text-left bg-surface border border-border px-3 py-2.5 rounded-input text-sm flex items-center justify-between hover:border-primary transition-all duration-150 ' + (this.openPopoverId === index ? 'ring-2 ring-blue-100 border-primary' : '');

                    var displayValue = this._getDisplayValue(filter);
                    triggerBtn.innerHTML = '<span class="truncate block text-textPrimary font-medium pr-1">' + displayValue + '</span><i data-lucide="chevron-down" class="w-4 h-4 text-textSecondary flex-shrink-0 transition-transform duration-150 ' + (this.openPopoverId === index ? 'transform rotate-180 text-primary' : '') + '"></i>';

                    triggerBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        this._togglePopover(index);
                    });
                    colDiv.appendChild(triggerBtn);

                    if (this.openPopoverId === index) {
                        colDiv.appendChild(this._createPopoverContent(filter, index));
                    }

                    gridContainer.appendChild(colDiv);
                });

                if (typeof lucide !== 'undefined') lucide.createIcons();

                if (this.options.onChange) this.options.onChange(this.stateFilters);
            }

            _getDisplayValue(filter) {
                if (filter.type === 'multi-select-dropdown') {
                    const selected = filter.options.filter(o => o.selected).map(o => o.value);
                    if (selected.length === 0) return filter.placeholder || 'Chọn tất cả';
                    if (selected.length === filter.options.length) return 'Tất cả (' + selected.length + ')';
                    return selected.join(', ');
                } else if (filter.type === 'range-input') {
                    const fields = Object.keys(filter.inputs);
                    const min = filter.inputs[fields[0]].value;
                    const max = filter.inputs[fields[1]].value;
                    if (min === '0' && max === '0') return filter.defaultValue || 'Tất cả';
                    return min + ' - ' + max + ' m';
                } else if (filter.type === 'range-slider') {
                    return 'Tỷ lệ: ' + filter.sliderRange.min + ' - ' + filter.sliderRange.max;
                }
                return '';
            }

            _togglePopover(index) {
                this.openPopoverId = (this.openPopoverId === index) ? null : index;
                this.render();
            }

            _createPopoverContent(filter, index) {
                const wrapper = document.createElement('div');
                wrapper.className = 'absolute left-0 right-0 top-[72px] z-50 bg-surface border border-border rounded-card shadow-popover p-4 mt-1 flex flex-col gap-3 min-w-[260px]';
                wrapper.addEventListener('click', (e) => { e.stopPropagation(); });

                if (filter.type === 'multi-select-dropdown') {
                    if (filter.hasSearch) {
                        const searchContainer = document.createElement('div');
                        searchContainer.className = 'relative mb-1';
                        searchContainer.innerHTML = '<span class="absolute inset-y-0 left-0 flex items-center pl-2.5 text-textSecondary"><i data-lucide="search" class="w-3.5 h-3.5"></i></span><input type="text" placeholder="' + (filter.searchPlaceholder || 'Tìm kiếm...') + '" class="w-full pl-8 pr-3 py-1.5 bg-slate-50 text-xs border border-border rounded-input focus:outline-none focus:border-primary focus:bg-white" id="' + this.instanceId + '-popover-search-' + index + '">';
                        searchContainer.querySelector('input').addEventListener('keyup', (e) => { this._filterPopoverList(index, e.target.value); });
                        wrapper.appendChild(searchContainer);
                    }

                    if (filter.hasSelectAll) {
                        const isAllChecked = filter.options.every(o => o.selected);
                        const sac = document.createElement('div');
                        sac.className = 'flex items-center justify-between pb-2 mb-1 border-b border-slate-100';
                        sac.innerHTML = '<span class="text-xs text-textSecondary font-medium">' + (filter.selectAllLabel || 'Chọn tất cả') + '</span><button class="text-xs font-semibold text-primary hover:underline transition-all" type="button">' + (isAllChecked ? 'Bỏ chọn' : 'Chọn hết') + '</button>';
                        sac.querySelector('button').addEventListener('click', () => { this._toggleSelectAllOptions(index, !isAllChecked); });
                        wrapper.appendChild(sac);
                    }

                    const listDiv = document.createElement('div');
                    listDiv.className = 'max-h-48 overflow-y-auto custom-scrollbar flex flex-col gap-1 pr-1';
                    listDiv.id = this.instanceId + '-popover-list-' + index;

                    filter.options.forEach((option, optIdx) => {
                        const optionRow = document.createElement('label');
                        optionRow.className = 'flex items-center gap-2.5 px-2 py-1.5 rounded-input cursor-pointer hover:bg-slate-50 transition-colors text-xs text-textPrimary ' + (option.selected ? 'bg-blue-50/50 text-blue-700 font-medium' : '');
                        optionRow.innerHTML = '<input type="checkbox" ' + (option.selected ? 'checked' : '') + ' class="w-4 h-4 text-primary border-border rounded focus:ring-0"><span class="truncate">' + option.value + '</span>';
                        optionRow.querySelector('input').addEventListener('click', () => { this._toggleOptionSelection(index, optIdx); });
                        listDiv.appendChild(optionRow);
                    });
                    wrapper.appendChild(listDiv);

                    const actionDiv = document.createElement('div');
                    actionDiv.className = 'flex justify-end gap-2 pt-2 border-t border-slate-100';
                    actionDiv.innerHTML = '<button type="button" class="px-3 py-1.5 text-xs font-semibold text-textSecondary hover:bg-slate-100 rounded-btn transition-colors">Hoàn tất</button>';
                    actionDiv.querySelector('button').addEventListener('click', () => { this._togglePopover(null); });
                    wrapper.appendChild(actionDiv);

                } else if (filter.type === 'range-input') {
                    const fields = Object.keys(filter.inputs);
                    const minKey = fields[0];
                    const maxKey = fields[1];
                    const containerGrid = document.createElement('div');
                    containerGrid.className = 'grid grid-cols-2 gap-3 mb-2';
                    containerGrid.innerHTML = '<div><label class="text-[10px] uppercase font-bold tracking-wider text-textSecondary block mb-1">' + filter.inputs[minKey].label + '</label><input type="number" id="' + this.instanceId + '-range-min-' + index + '" value="' + filter.inputs[minKey].value + '" class="w-full p-2 bg-slate-50 text-xs text-textPrimary border border-border rounded-input focus:outline-none focus:border-primary focus:bg-white"></div><div><label class="text-[10px] uppercase font-bold tracking-wider text-textSecondary block mb-1">' + filter.inputs[maxKey].label + '</label><input type="number" id="' + this.instanceId + '-range-max-' + index + '" value="' + filter.inputs[maxKey].value + '" class="w-full p-2 bg-slate-50 text-xs text-textPrimary border border-border rounded-input focus:outline-none focus:border-primary focus:bg-white"></div>';
                    wrapper.appendChild(containerGrid);

                    const actionDiv2 = document.createElement('div');
                    actionDiv2.className = 'flex justify-end gap-2 pt-1.5';
                    actionDiv2.innerHTML = '<button type="button" class="btn-cancel px-2.5 py-1.5 text-xs font-semibold text-textSecondary hover:bg-slate-100 rounded-btn transition-colors">' + filter.actions.cancelLabel + '</button><button type="button" class="btn-confirm px-3 py-1.5 text-xs font-semibold text-white bg-primary hover:bg-blue-700 rounded-btn transition-colors">' + filter.actions.confirmLabel + '</button>';
                    actionDiv2.querySelector('.btn-cancel').addEventListener('click', () => { this._togglePopover(null); });
                    actionDiv2.querySelector('.btn-confirm').addEventListener('click', () => {
                        const minVal = document.getElementById(this.instanceId + '-range-min-' + index).value || '0';
                        const maxVal = document.getElementById(this.instanceId + '-range-max-' + index).value || '0';
                        this._confirmRangeInput(index, minKey, maxKey, minVal, maxVal);
                    });
                    wrapper.appendChild(actionDiv2);

                } else if (filter.type === 'range-slider') {
                    const fields = Object.keys(filter.inputs);
                    const minKey = fields[0];
                    const maxKey = fields[1];
                    const sliderBlock = document.createElement('div');
                    sliderBlock.className = 'space-y-4 mb-2';
                    sliderBlock.innerHTML = '<div><div class="flex justify-between items-center text-xs text-textSecondary mb-2"><span>Mức giá tối đa</span><span class="font-bold text-primary" id="' + this.instanceId + '-slider-label-val-' + index + '">30 tỷ đ</span></div><input type="range" min="0" max="100" value="100" step="0.5" class="w-full accent-primary h-1 bg-slate-200 rounded-lg cursor-pointer" id="' + this.instanceId + '-slider-range-bar-' + index + '"></div><div class="grid grid-cols-2 gap-2"><div><label class="text-[10px] text-textSecondary block mb-1">' + filter.inputs[minKey].label + '</label><input type="text" id="' + this.instanceId + '-price-min-val-' + index + '" readonly value="' + filter.inputs[minKey].value + '" class="w-full p-2 bg-slate-100 text-xs text-textSecondary border border-border rounded-input cursor-not-allowed"></div><div><label class="text-[10px] text-textSecondary block mb-1">' + filter.inputs[maxKey].label + '</label><input type="text" id="' + this.instanceId + '-price-max-val-' + index + '" readonly value="' + filter.inputs[maxKey].value + '" class="w-full p-2 bg-slate-100 text-xs text-textSecondary border border-border rounded-input cursor-not-allowed"></div></div>';
                    const rangeInput = sliderBlock.querySelector('input[type="range"]');
                    rangeInput.addEventListener('input', (e) => {
                        const val = e.target.value;
                        sliderBlock.querySelector('#' + this.instanceId + '-slider-label-val-' + index).innerText = val + ' tỷ đ';
                        sliderBlock.querySelector('#' + this.instanceId + '-price-max-val-' + index).value = (val * 1000000000).toLocaleString('vi-VN') + ' đ';
                    });
                    wrapper.appendChild(sliderBlock);

                    const actionDiv3 = document.createElement('div');
                    actionDiv3.className = 'flex justify-end gap-2 pt-2 border-t border-slate-100';
                    actionDiv3.innerHTML = '<button type="button" class="btn-cancel px-2.5 py-1.5 text-xs font-semibold text-textSecondary hover:bg-slate-100 rounded-btn transition-colors">' + filter.actions.cancelLabel + '</button><button type="button" class="btn-confirm px-3 py-1.5 text-xs font-semibold text-white bg-primary hover:bg-blue-700 rounded-btn transition-colors">' + filter.actions.confirmLabel + '</button>';
                    actionDiv3.querySelector('.btn-cancel').addEventListener('click', () => { this._togglePopover(null); });
                    actionDiv3.querySelector('.btn-confirm').addEventListener('click', () => {
                        const finalVal = rangeInput.value;
                        this._confirmSliderValue(index, minKey, maxKey, finalVal);
                    });
                    wrapper.appendChild(actionDiv3);
                }

                return wrapper;
            }

            _filterPopoverList(index, query) {
                const listEl = document.getElementById(this.instanceId + '-popover-list-' + index);
                if (!listEl) return;
                const cleanQuery = query.toLowerCase().trim();
                const labels = listEl.getElementsByTagName('label');
                for (let i = 0; i < labels.length; i++) {
                    labels[i].style.display = labels[i].innerText.toLowerCase().includes(cleanQuery) ? 'flex' : 'none';
                }
            }

            _toggleOptionSelection(filterIdx, optionIdx) {
                const opt = this.stateFilters[filterIdx].options[optionIdx];
                opt.selected = !opt.selected;
                this.stateFilters[filterIdx].selectedValues = this.stateFilters[filterIdx].options.filter(o => o.selected).map(o => o.value);
                this.render();
                if (this.options.onToast) this.options.onToast('Đã cập nhật: ' + opt.value);
            }

            _toggleSelectAllOptions(filterIdx, checkStatus) {
                this.stateFilters[filterIdx].options.forEach(o => { o.selected = checkStatus; });
                this.stateFilters[filterIdx].selectedValues = this.stateFilters[filterIdx].options.filter(o => o.selected).map(o => o.value);
                this.render();
                if (this.options.onToast) this.options.onToast(checkStatus ? 'Đã chọn tất cả' : 'Đã bỏ chọn tất cả');
            }

            _confirmRangeInput(index, minKey, maxKey, minVal, maxVal) {
                this.stateFilters[index].inputs[minKey].value = minVal;
                this.stateFilters[index].inputs[maxKey].value = maxVal;
                this.openPopoverId = null;
                this.render();
                if (this.options.onToast) this.options.onToast('Đã lưu phạm vi');
            }

            _confirmSliderValue(index, minKey, maxKey, sliderVal) {
                this.stateFilters[index].sliderRange.max = sliderVal + '.0 tỷ';
                this.stateFilters[index].inputs[maxKey].value = (sliderVal * 1000000000).toLocaleString('vi-VN') + ' đ';
                this.openPopoverId = null;
                this.render();
                if (this.options.onToast) this.options.onToast('Đã lưu khoảng giá tối đa: ' + sliderVal + ' tỷ');
            }

            removeFilterCriteria(filterIdx, optIdx) {
                const filter = this.stateFilters[filterIdx];
                if (filter.type === 'multi-select-dropdown' && optIdx !== null) {
                    filter.options[optIdx].selected = false;
                    filter.selectedValues = filter.options.filter(o => o.selected).map(o => o.value);
                } else if (filter.type === 'range-input') {
                    const fields = Object.keys(filter.inputs);
                    filter.inputs[fields[0]].value = '0';
                    filter.inputs[fields[1]].value = '0';
                } else if (filter.type === 'range-slider') {
                    const fields = Object.keys(filter.inputs);
                    filter.sliderRange.max = '100.0 tỷ';
                    filter.inputs[fields[1]].value = '100.000.000.000 đ';
                }
                this.render();
                if (this.options.onToast) this.options.onToast('Đã gỡ tiêu chí');
            }

            reset(originalConfig) {
                this.stateFilters = JSON.parse(JSON.stringify(originalConfig));
                this.openPopoverId = null;
                this.render();
                if (this.options.onToast) this.options.onToast('Đã thiết lập lại');
            }

        }

        // ===================== Filter Configuration =====================
        var filterConfigJSON = {
            filters: [
                {
                    label: "Hình thức",
                    type: "multi-select-dropdown",
                    hasSelectAll: true,
                    selectAllLabel: "Chọn tất cả",
                    selectedValues: ["Bán", "Thuê"],
                    options: [
                        { value: "Bán", selected: true },
                        { value: "Thuê", selected: true },
                        { value: "Sang nhượng", selected: false }
                    ]
                },
                {
                    label: "Loại hình",
                    placeholder: "Chọn loại hình",
                    type: "multi-select-dropdown",
                    hasSearch: true,
                    hasSelectAll: true,
                    selectAllLabel: "Chọn tất cả",
                    searchPlaceholder: "Tìm kiếm",
                    options: [
                        { value: "Căn hộ", selected: false },
                        { value: "Biệt thự", selected: false },
                        { value: "Nhà phố", selected: false },
                        { value: "Đất nền", selected: false }
                    ]
                },
                {
                    label: "Nhãn",
                    placeholder: "Chọn nhãn",
                    type: "multi-select-dropdown",
                    hasSearch: true,
                    hasSelectAll: true,
                    selectAllLabel: "Chọn tất cả",
                    searchPlaceholder: "Tìm kiếm",
                    options: [
                        { value: "Sổ hồng sẵn", selected: false },
                        { value: "Bán nhanh", selected: false },
                        { value: "Hạ giá", selected: false },
                        { value: "Nội thất", selected: false },
                        { value: "Hồ bơi", selected: false },
                        { value: "Sổ đỏ", selected: false },
                        { value: "Mặt tiền", selected: false },

        var filterInstance = null;

        // Tab selection logic
        function switchTab(tab) {
            activeTab = tab;
            
            const tabs = ['all', 'pinned', 'hot'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (t === tab) {
                    btn.classList.add('text-primary', 'bg-surface', 'shadow-sm');
                    btn.classList.remove('text-textSecondary');
                } else {
                    btn.classList.remove('text-primary', 'bg-surface', 'shadow-sm');
                    btn.classList.add('text-textSecondary');
                }
            });

            applyFilters();
        }

        // Live search input handling
        function handleSearch(query) {
            searchQuery = query.toLowerCase().trim();
            applyFilters();
        }

        // CRMFilter bridge - applies all filters to the product list
        function applyFiltersToGrid(currentFilters) {
            if (!currentFilters) {
                if (filterInstance) currentFilters = filterInstance.stateFilters;
                else currentFilters = filterConfigJSON.filters;
            }

            const searchVal = searchQuery;

            const activeForms = currentFilters[0].options.filter(o => o.selected).map(o => o.value);
            const activeTypes = currentFilters[1].options.filter(o => o.selected).map(o => o.value);
            const activeLabels = currentFilters[2].options.filter(o => o.selected).map(o => o.value);
            const activeDistricts = currentFilters[3].options.filter(o => o.selected).map(o => o.value);
            const activeWards = currentFilters[4].options.filter(o => o.selected).map(o => o.value);
            const activeOrientations = currentFilters[5].options.filter(o => o.selected).map(o => o.value);
            const activeRooms = currentFilters[6].options.filter(o => o.selected).map(o => o.value);
            const activeStatus = currentFilters[9].options.filter(o => o.selected).map(o => o.value);

            const minAreaInput = parseInt(currentFilters[7].inputs.minArea.value) || 0;
            const maxAreaInput = parseInt(currentFilters[7].inputs.maxArea.value) || 0;

            const minWidthInput = parseFloat(currentFilters[8].inputs.minWidth.value) || 0;
            const maxWidthInput = parseFloat(currentFilters[8].inputs.maxWidth.value) || 0;

            const sliderMaxString = currentFilters[10].sliderRange.max;
            const sliderLimitGia = parseFloat(sliderMaxString.replace(' tỷ', ''));

            let filtered = initialProductsList.filter(prod => {
                if (activeTab === 'pinned' && !prod.isPinned) return false;
                if (activeTab === 'hot' && !prod.isHot) return false;

                if (searchVal) {
                    const matchText = (prod.title + ' ' + prod.id + ' ' + prod.address + ' ' + prod.postedUser.name).toLowerCase();
                    if (!matchText.includes(searchVal)) return false;
                }

                if (activeForms.length > 0 && !activeForms.includes(prod.transactionType)) return false;
                if (activeTypes.length > 0 && !activeTypes.includes(prod.propertyType)) return false;

                if (activeLabels.length > 0) {
                    const hasLabel = prod.highlightBadges.some(lbl => activeLabels.includes(lbl));
                    if (!hasLabel) return false;
                }

                if (activeDistricts.length > 0 && !activeDistricts.includes(prod.district)) return false;
                if (activeWards.length > 0 && !activeWards.includes(prod.ward)) return false;
                if (activeOrientations.length > 0 && !activeOrientations.includes(prod.orientation)) return false;
                if (activeRooms.length > 0 && !activeRooms.includes(String(prod.roomCount))) return false;
                if (activeStatus.length > 0 && !activeStatus.includes(prod.status)) return false;

                if (minAreaInput > 0 && prod.landArea < minAreaInput) return false;
                if (maxAreaInput > 0 && prod.landArea > maxAreaInput) return false;

                if (minWidthInput > 0 && prod.frontWidth < minWidthInput) return false;
                if (maxWidthInput > 0 && prod.frontWidth > maxWidthInput) return false;

                if (prod.priceNum > 0 && prod.priceNum > sliderLimitGia) return false;

                return true;
            });

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedProducts = filtered.slice(startIndex, endIndex);

            renderGridProducts(paginatedProducts);
            renderPagination(filtered.length, startIndex, endIndex);
        }

        function applyFilters(resetPage = true) {
            if (resetPage) currentPage = 1;
            if (filterInstance) {
                applyFiltersToGrid(filterInstance.stateFilters);
            } else {
                const startIndex = (currentPage - 1) * itemsPerPage;
                const endIndex = startIndex + itemsPerPage;
                const paginated = initialProductsList.slice(startIndex, endIndex);
                renderGridProducts(paginated);
                renderPagination(initialProductsList.length, startIndex, endIndex);
            }
        }

        function renderPagination(totalItems, startIndex, endIndex) {
            const paginationContainer = document.getElementById('pagination-container');
            const rangeText = document.getElementById('pagination-range');
            const totalText = document.getElementById('pagination-total');
            const buttonsContainer = document.getElementById('pagination-buttons');

            if (totalItems === 0) {
                paginationContainer.classList.add('hidden');
                return;
            }
            paginationContainer.classList.remove('hidden');

            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const displayStart = totalItems === 0 ? 0 : startIndex + 1;
            const displayEnd = Math.min(endIndex, totalItems);

            rangeText.innerText = `${displayStart} - ${displayEnd}`;
            totalText.innerText = totalItems;

            let buttonsHTML = '';

            const prevDisabled = currentPage === 1 ? 'disabled opacity-50 cursor-not-allowed' : 'hover:bg-slate-50';
            buttonsHTML += `
                <button onclick="${currentPage > 1 ? `goToPage(${currentPage - 1})` : ''}" ${currentPage === 1 ? 'disabled' : ''} class="flex h-9 items-center justify-center gap-1 border border-border rounded-[10px] px-3 text-[12px] font-medium text-textSecondary transition-all duration-150 ${prevDisabled}">
                    <i data-lucide="chevron-left" class="h-4 w-4"></i>
                    Trước
                </button>
            `;

            for (let i = 1; i <= totalPages; i++) {
                const activeClass = currentPage === i 
                    ? 'bg-primary text-white border-primary shadow-sm' 
                    : 'bg-white border-border text-textSecondary hover:text-textPrimary hover:bg-slate-50';
                buttonsHTML += `
                    <button onclick="goToPage(${i})" class="flex h-9 w-9 items-center justify-center border rounded-[10px] text-[12px] font-semibold transition-all duration-150 ${activeClass}">
                        ${i}
                    </button>
                `;
            }

            const nextDisabled = currentPage === totalPages ? 'disabled opacity-50 cursor-not-allowed' : 'hover:bg-slate-50';
            buttonsHTML += `
                <button onclick="${currentPage < totalPages ? `goToPage(${currentPage + 1})` : ''}" ${currentPage === totalPages ? 'disabled' : ''} class="flex h-9 items-center justify-center gap-1 border border-border rounded-[10px] px-3 text-[12px] font-medium text-textSecondary transition-all duration-150 ${nextDisabled}">
                    Sau
                    <i data-lucide="chevron-right" class="h-4 w-4"></i>
                </button>
            `;

            buttonsContainer.innerHTML = buttonsHTML;
            
            if (window.lucide) {
                lucide.createIcons();
            }
        }

        function goToPage(page) {
            currentPage = page;
            applyFilters(false);
            document.getElementById('product-grid').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function resetFilters() {
            document.getElementById('search-input').value = '';
            searchQuery = '';
            if (filterInstance) {
                filterInstance.reset(filterConfigJSON.filters);
            }
            switchTab('all');
        }

        function updateTabCounts() {
            const total = initialProductsList.length;
            const pinned = initialProductsList.filter(p => p.isPinned).length;
            const hot = initialProductsList.filter(p => p.isHot).length;

            document.getElementById('count-all').innerText = total;
            document.getElementById('count-pinned').innerText = pinned;
            document.getElementById('count-hot').innerText = hot;
        }

        function renderGridProducts(products) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            const fragment = document.createDocumentFragment();
            products.forEach(prod => {
                const card = document.createElement('product-card');
                card.product = prod;
                fragment.appendChild(card);
            });
            grid.appendChild(fragment);
            lucide.createIcons();
        }

        function togglePin(id) {
            const product = initialProductsList.find(p => p.id === id);
            if (product) {
                product.isPinned = !product.isPinned;
                showToast(
                    product.isPinned ? "Đã ghim bất động sản" : "Đã bỏ ghim bất động sản",
                    `Sản phẩm mã ${id} đã được cập nhật thành công.`
                );
                updateTabCounts();
                applyFilters();
            }
        }

        function openAddModal() {
            if (typeof navigate === 'function') navigate('them-hang');
        }

        function closeAddModal() {
            document.getElementById('add-modal').classList.add('hidden');
            document.getElementById('add-product-form').reset();
        }

        }

        function saveNewProduct(e) {
            e.preventDefault();

            const title = document.getElementById('form-title').value;
            const transaction = document.getElementById('form-transaction').value;
            const type = document.getElementById('form-type').value;
            const address = document.getElementById('form-address').value;
            const area = parseFloat(document.getElementById('form-area').value);
            const rawTransfer = document.getElementById('form-transfer-price').value;
            const beds = parseInt(document.getElementById('form-beds').value) || 0;
            const baths = parseInt(document.getElementById('form-baths').value) || 0;
            const floors = parseInt(document.getElementById('form-floors').value) || 1;
            const status = document.getElementById('form-status').value;
            const image = document.getElementById('form-image-select').value;
            
            const tagsInput = document.getElementById('form-tags').value;
            const highlightBadges = tagsInput ? tagsInput.split(',').map(tag => tag.trim()) : ["Mới cập nhật"];

            let calculatedUnitPrice = "---";
            if (transaction === 'Bán') {
                const parseNum = parseFloat(rawTransfer);
                if (!isNaN(parseNum) && area > 0) {
                    calculatedUnitPrice = ((parseNum * 1000) / area).toFixed(1);
                }
            }

            const newId = `BDS-${1000 + initialProductsList.length + 1}`;
            
            const newProduct = {
                id: newId,
                title: title,
                transactionType: transaction,
                propertyType: type,
                status: status,
                thumbnail: image,
                highlightBadges: highlightBadges,
                roomCount: beds,
                wcCount: baths,
                width: 0,
                length: 0,
                transferPrice: rawTransfer || "Thương lượng",
                address: address,
                landArea: area,
                unitPrice: calculatedUnitPrice,
                floorCount: floors,
                isPinned: false,
                isHot: false,
                postedUser: {
                    name: "Phạm Minh Khang",
                    avatar: "https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?auto=format&fit=crop&w=200&q=80"
                },
                postedDate: new Date().toISOString().split('T')[0]
            };

            initialProductsList.unshift(newProduct);

            closeAddModal();
            showToast("Thành công", `Bất động sản mới ${newId} đã được đưa lên rổ hàng.`);
            updateTabCounts();
            resetFilters();
        }

        var toastTimeout;
        function showToast(title, desc) {
            const toast = document.getElementById('toast-notif');
            if (desc === undefined) { desc = title; title = 'Bộ lọc'; }
            document.getElementById('toast-title').innerText = title;
            document.getElementById('toast-desc').innerText = desc;

            clearTimeout(toastTimeout);
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);

            toastTimeout = setTimeout(() => {
                hideToast();
            }, 4000);
        }

        function hideToast() {
            const toast = document.getElementById('toast-notif');
            toast.classList.add('translate-y-10', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 300);
        }

        // Init (replaces DOMContentLoaded)
        updateTabCounts();

        // Initialize CRMFilter
        filterInstance = new CRMFilter('#crm-filter-app-container', filterConfigJSON.filters, {
            onChange: function(activeFilters) {
                currentPage = 1;
                applyFiltersToGrid(activeFilters);
            },
            onToast: function(message) {
                showToast('Bộ lọc', message);
            }
        });

        window.resetAllFiltersFromGrid = function() {
            if (filterInstance) {
                filterInstance.reset(filterConfigJSON.filters);
                document.getElementById('search-input').value = '';
                searchQuery = '';
            }
        };

        applyFilters();

        // Event delegation for product-card custom events
        var productGrid = document.getElementById('product-grid');
        if (productGrid) {
            productGrid.addEventListener('product-card:select', function(e) {
                selectProductAndNavigate(e.detail.id);
            });
            productGrid.addEventListener('product-card:pin', function(e) {
                togglePin(e.detail.id);
            });
            productGrid.addEventListener('product-card:action', function(e) {
                var id = e.detail.id;
                var action = e.detail.action;
                if (action === 'hot') openHotModal(id);
                else if (action === 'unhot') unpromoteHot(id);
                else if (action === 'edit') showToast('Chỉnh sửa', 'Tính năng đang phát triển');
                else if (action === 'approve') showToast('Duyệt', 'Đã duyệt sản phẩm');
                else if (action === 'reject') showToast('Từ chối', 'Đã từ chối sản phẩm');
                else if (action === 'delete') showToast('Xóa', 'Đã xóa sản phẩm');
            });
        }

        var currentHotProductId = null;

        function openHotModal(id) {
            currentHotProductId = id;
            var today = new Date();
            var endDate = new Date(today);
            endDate.setDate(endDate.getDate() + 7);
            document.getElementById('hot-start-date').value = today.toISOString().split('T')[0];
            document.getElementById('hot-end-date').value = endDate.toISOString().split('T')[0];
            document.getElementById('hot-modal').classList.remove('hidden');
            lucide.createIcons();
        }

        function closeHotModal() {
            document.getElementById('hot-modal').classList.add('hidden');
            currentHotProductId = null;
        }

        function confirmHotProduct() {
            var start = document.getElementById('hot-start-date').value;
            var end = document.getElementById('hot-end-date').value;
            if (!start || !end) { showToast('Lỗi', 'Vui lòng chọn ngày bắt đầu và kết thúc.'); return; }
            if (end < start) { showToast('Lỗi', 'Ngày kết thúc phải sau ngày bắt đầu.'); return; }
            var product = initialProductsList.find(function(p) { return p.id === currentHotProductId; });
            if (product) {
                product.isHot = true;
                product.hotStartDate = start;
                product.hotEndDate = end;
                closeHotModal();
                applyFilters();
                showToast('Thành công', 'Sản phẩm đã được đẩy lên Hàng Hot 🔥');
            }
        }

        function unpromoteHot(id) {
            var product = initialProductsList.find(function(p) { return p.id === id; });
            if (product) {
                product.isHot = false;
                delete product.hotStartDate;
                delete product.hotEndDate;
                applyFilters();
                showToast('Đã bỏ Hàng Hot', 'Sản phẩm đã được gỡ khỏi Hàng Hot.');
            }
        }
