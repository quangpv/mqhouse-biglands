            <div class="grid grid-cols-2 gap-3">
                <div>

                    <input type="text" id="modal-unitprice" required class="w-full px-2.5 py-1.5 text-xs border border-[#E2E8F0] input-premium text-[#0F172A]">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">

                    <label class="block text-[11px] font-semibold text-[#0F172A] mb-1">Hoa hồng đại lý</label>
                    <input type="text" id="modal-commission" required class="w-full px-2.5 py-1.5 text-xs border border-[#E2E8F0] input-premium text-[#0F172A]">

                    <option value="Ngưng nhận">Ngưng nhận khách (Tạm khóa)</option>
                </select>
            </div>

            <div class="flex gap-2 justify-end pt-2">
                <button type="button" onclick="closeEditModal()" class="btn-secondary px-3 py-1.5 text-xs font-semibold">Hủy</button>
                <button type="submit" class="btn-primary bg-[#2563EB] px-4 py-1.5 text-xs font-semibold">Lưu thay đổi</button>
            </div>
        </form>

</div>

var properties = [];
var activePropertyId = "BDS-1001";
var activeImageIndex = 0;

function createFallbackProperty(id) {
    return {
        id: id,
        title: "Sản phẩm " + id,
        type: "Bán",
        category: "BĐS",
        status: "Còn hàng",
        price: "Liên hệ",
        unitPrice: "\u2014",
        commission: "\u2014",
        additionalPriceNotes: "\u2014",
        area: "\u2014",
        bedrooms: "-",
        bathrooms: "-",
        floors: "-",
        orientation: "-",
        roadInfo: "-",
        address: "\u2014",
        images: ["https://images.unsplash.com/photo-1580587771525-78b9dba3b914?auto=format&fit=crop&w=1200&q=80"],
        description: "<p>Thông tin chi tiết sản phẩm đang được cập nhật.</p>",
        highlights: ["Thông tin đang được cập nhật."],
        attributes: [{ key: "Tr\u1ea1ng th\u00e1i", value: "\u0110ang c\u1eadp nh\u1eadt" }],
        owner: "\u2014",
        ownerPhone: "\u2014",
        comments: []
    };
}

function initApp() {
    properties = JSON.parse(JSON.stringify(PROPERTIES_MOCK_DATA));
    selectProperty(activePropertyId);
}

function selectProperty(id) {
    activePropertyId = id;
    activeImageIndex = 0;

    var prop = properties.find(function(p) { return p.id === id; }) || createFallbackProperty(id);

    document.getElementById("detail-title").innerText = prop.title;
    document.getElementById("detail-address").innerText = prop.address;

    document.getElementById("detail-price").innerText = prop.price;
    document.getElementById("detail-unit-price").innerText = prop.unitPrice;
    document.getElementById("detail-commission").innerText = prop.commission;
    document.getElementById("detail-profit-note").innerText = prop.additionalPriceNotes;

    document.getElementById("detail-description").innerHTML = prop.description;

    document.getElementById("owner-name").innerText = prop.owner;
    document.getElementById("owner-phone").innerText = prop.ownerPhone;
    document.getElementById("owner-call-link").href = "tel:" + prop.ownerPhone.replace(/\./g, "");

    var typeBadge = document.getElementById("detail-type-badge");
    typeBadge.innerText = prop.type + (prop.category ? " " + prop.category : "");

    if (prop.type === "Bán") {
        typeBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded-md uppercase tracking-wider bg-blue-50 text-[#2563EB] border border-blue-200/50";
    } else if (prop.type === "Cho thuê") {
        typeBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded-md uppercase tracking-wider bg-purple-50 text-purple-700 border border-purple-200/50";
    } else {
        typeBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded-md uppercase tracking-wider bg-pink-50 text-pink-700 border border-pink-200/50";
    }

    var statusBadge = document.getElementById("detail-status-badge");
    statusBadge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full ' + (prop.status === 'Còn hàng' ? 'bg-[#16A34A]' : prop.status === 'Đã cọc' ? 'bg-[#F59E0B]' : 'bg-[#DC2626]') + '"></span> ' + prop.status;
    if (prop.status === "Còn hàng") {
        statusBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded-md flex items-center gap-1 bg-emerald-50 text-[#16A34A] border border-emerald-200/50";
    } else if (prop.status === "Đã cọc") {
        statusBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded-md flex items-center gap-1 bg-amber-50 text-[#F59E0B] border border-amber-200/50";
    } else {
        statusBadge.className = "px-2 py-0.5 text-[10px] font-bold rounded-md flex items-center gap-1 bg-rose-50 text-[#DC2626] border border-rose-200/50";
    }

    document.getElementById("detail-code-badge").innerText = prop.id;
    if (document.getElementById("mobile-code-badge")) {
        document.getElementById("mobile-code-badge").innerText = prop.id;
    }

    document.getElementById("quick-area").innerText = prop.area;
    document.getElementById("quick-beds").innerText = prop.bedrooms || "-";
    document.getElementById("quick-baths").innerText = prop.bathrooms || "-";
    document.getElementById("quick-floors").innerText = prop.floors || "-";
    document.getElementById("quick-direction").innerText = prop.orientation || "-";
    document.getElementById("quick-road").innerText = prop.roadInfo || "-";

    var attributesContainer = document.getElementById("detail-attributes-table");
    if (prop.attributes && prop.attributes.length > 0) {
        attributesContainer.innerHTML = prop.attributes.map(function(attr) {
            return '<div class="flex justify-between py-1.5 px-2 bg-slate-50 rounded-md"><span class="text-[#64748B] font-medium">' + attr.key + ':</span><span class="font-bold text-[#0F172A] text-right ml-2">' + attr.value + '</span></div>';
        }).join("");
    } else {
        attributesContainer.innerHTML = '<div class="flex justify-between py-1.5 px-2 bg-slate-50 rounded-md"><span class="text-[#64748B]">Mức giá niêm yết:</span><span class="font-bold text-[#0F172A]">' + prop.price + '</span></div><div class="flex justify-between py-1.5 px-2 bg-slate-50 rounded-md"><span class="text-[#64748B]">Tổng diện tích:</span><span class="font-bold text-[#0F172A]">' + prop.area + '</span></div>';
    }

    renderComments();
    updateGalleryImage();

    document.getElementById("mainContent").scrollTop = 0;

    lucide.createIcons();
}

function updateGalleryImage() {
    var prop = properties.find(function(p) { return p.id === activePropertyId; }) || createFallbackProperty(activePropertyId);
    if (!prop || !prop.images || prop.images.length === 0) return;

    var activeImg = document.getElementById("active-gallery-image");
    activeImg.src = prop.images[activeImageIndex];

    document.getElementById("gallery-counter").innerText = (activeImageIndex + 1) + " / " + prop.images.length;

    var thumbContainer = document.getElementById("gallery-thumbnails");
    thumbContainer.innerHTML = prop.images.map(function(img, idx) {
        var isActive = idx === activeImageIndex;
        return '<div onclick="selectGalleryIndex(' + idx + ')" class="w-14 h-10 rounded-md overflow-hidden shrink-0 border-2 cursor-pointer transition ' + (isActive ? 'border-[#2563EB] ring-1 ring-blue-100' : 'border-transparent opacity-60 hover:opacity-100') + '"><img src="' + img + '" alt="Thumb" class="w-full h-full object-cover"></div>';
    }).join("");
}

function selectGalleryIndex(idx) {
    activeImageIndex = idx;
    updateGalleryImage();
}

function navigateGallery(direction) {
    var prop = properties.find(function(p) { return p.id === activePropertyId; }) || createFallbackProperty(activePropertyId);
    if (!prop || !prop.images || prop.images.length === 0) return;

    activeImageIndex += direction;
    if (activeImageIndex >= prop.images.length) activeImageIndex = 0;
    if (activeImageIndex < 0) activeImageIndex = prop.images.length - 1;

    updateGalleryImage();
}

function copyToClipboardText() {
    var prop = properties.find(function(p) { return p.id === activePropertyId; }) || createFallbackProperty(activePropertyId);
    if (!prop) return;

    var textToCopy = "[MÃ SẢN PHẨM: " + prop.id + "] " + prop.title.toUpperCase() + "\n-------------------------------------------\n📍 Địa chỉ: " + prop.address + "\n💰 Giá bán niêm yết: " + prop.price + " (Đơn giá: " + prop.unitPrice + ")\n📐 Diện tích: " + prop.area + " - Thiết kế: " + prop.floors + " lầu, " + prop.bedrooms + " phòng ngủ, " + prop.bathrooms + " WC.\n🧭 Hướng: " + prop.orientation + " - Hẻm: " + prop.roadInfo + "\n💵 Doanh thu khai thác hiện trạng: " + prop.additionalPriceNotes + "\n🤝 Hoa hồng nhận diện: " + prop.commission + "\n\n💡 Đặc điểm nổi bật:\n" + (prop.highlights ? prop.highlights.map(function(h) { return "- " + h; }).join("\n") : "") + "\n\nLiên hệ Chuyên Viên Phụ Trách để giao dịch đưa khách xem nhà!";

    var textarea = document.createElement("textarea");
    textarea.value = textToCopy.trim();
    textarea.style.position = "fixed";
    document.body.appendChild(textarea);
    textarea.focus();
    textarea.select();

    try {
        document.execCommand('copy');
        showToast("Đã sao chép tin đăng mẫu siêu tốc vào bộ nhớ!", "success");
    } catch (err) {
        showToast("Lỗi sao chép! Vui lòng thử lại.", "error");
    }

    document.body.removeChild(textarea);
}

function renderComments() {
    var prop = properties.find(function(p) { return p.id === activePropertyId; }) || createFallbackProperty(activePropertyId);
    if (!prop) return;

    var commentsContainer = document.getElementById("commentsStream");
    var badgeIndicator = document.getElementById("comments-count-badge");

    var commentsCount = prop.comments ? prop.comments.length : 0;
    badgeIndicator.innerText = commentsCount + " phản hồi";

    if (commentsCount === 0) {
        commentsContainer.innerHTML = '<div class="text-center py-6 text-slate-400"><p class="text-xs">Chưa có hoạt động hay phản hồi nội bộ nào.</p></div>';
        return;
    }

    commentsContainer.innerHTML = prop.comments.map(function(c) {
        return '<div class="flex gap-2.5 text-xs"><img src="' + c.avatar + '" alt="Agent avatar" class="w-6 h-6 rounded-full object-cover border shadow-sm ring-1 ring-slate-100"><div class="flex-1 bg-slate-50 p-2.5 rounded-xl border border-slate-100/80"><div class="flex justify-between items-center mb-0.5"><span class="font-bold text-[#0F172A] text-[10px]">' + c.author + '</span><span class="text-[9px] text-[#64748B]">' + c.date + '</span></div><p class="text-[#334155] leading-normal font-normal text-[11px]">' + c.text + '</p></div></div>';
    }).join("");
}

function addNewComment() {
    var input = document.getElementById("commentInput");
    var text = input.value.trim();
    if (!text) {
        showToast("Vui lòng ghi nội dung phản hồi cụ thể!", "error");
        return;
    }

    var propIndex = properties.findIndex(function(p) { return p.id === activePropertyId; });
    if (propIndex === -1) {
        showToast("Sản phẩm này chưa có dữ liệu chi tiết để phản hồi.", "error");
        return;
    }

    if (!properties[propIndex].comments) {
        properties[propIndex].comments = [];
    }

    properties[propIndex].comments.unshift({
        id: Date.now(),
        author: "Nguyễn Minh Quân (Bạn)",
        avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=120&q=80",
        text: text,
        date: "Vừa xong"
    });

    input.value = "";
    renderComments();
    showToast("Báo cáo dẫn khách mới được đồng bộ thành công!", "success");
}

function openEditModal() {
    var prop = properties.find(function(p) { return p.id === activePropertyId; });
    if (!prop) {
        showToast("Sản phẩm này chưa có dữ liệu chi tiết để chỉnh sửa.", "error");
        return;
    }

    document.getElementById("modal-price").value = prop.price;
    document.getElementById("modal-unitprice").value = prop.unitPrice;
    document.getElementById("modal-commission").value = prop.commission;
    document.getElementById("modal-profit").value = prop.additionalPriceNotes;
    document.getElementById("modal-status").value = prop.status;

    var modal = document.getElementById("editModal");
    modal.classList.remove("hidden");
    setTimeout(function() {
        modal.querySelector(".modal-content").classList.remove("scale-95");
        modal.querySelector(".modal-content").classList.add("scale-100");
    }, 10);
}

function closeEditModal() {
    var modal = document.getElementById("editModal");
    modal.querySelector(".modal-content").classList.remove("scale-100");
    modal.querySelector(".modal-content").classList.add("scale-95");
    setTimeout(function() {
        modal.classList.add("hidden");
    }, 100);
}

function savePropertyChanges(event) {
    event.preventDefault();

    var propIndex = properties.findIndex(function(p) { return p.id === activePropertyId; });
    if (propIndex === -1) return;

    properties[propIndex].price = document.getElementById("modal-price").value;
    properties[propIndex].unitPrice = document.getElementById("modal-unitprice").value;
    properties[propIndex].commission = document.getElementById("modal-commission").value;
    properties[propIndex].additionalPriceNotes = document.getElementById("modal-profit").value;
    properties[propIndex].status = document.getElementById("modal-status").value;

    selectProperty(activePropertyId);
    closeEditModal();
    showToast("Đã lưu các điều chỉnh thông số sản phẩm!", "success");
}

function reportQuickAction(action) {
    var messages = {
        'cọc': 'Đã ghi nhận khách cọc thành công!',
        'hết hàng': 'Đã chuyển trạng thái kho thành "Hết hàng".',
        'chốt': 'Chúc mừng! Đã ghi nhận khách chốt hàng.',
        'huỷ cọc': 'Đã ghi nhận huỷ cọc, cập nhật trạng thái kho.'
    };
    showToast(messages[action] || 'Thao tác đã được ghi nhận.', 'success');
}

function navigateToCloneProduct() {
    var prop = properties.find(function(p) { return p.id === activePropertyId; }) || createFallbackProperty(activePropertyId);
    if (!prop) return;
    sessionStorage.setItem('createProductMode', 'clone');
    sessionStorage.setItem('createProductData', JSON.stringify(prop));
    navigate('them-hang');
}

function navigateToEditProduct() {
    var prop = properties.find(function(p) { return p.id === activePropertyId; }) || createFallbackProperty(activePropertyId);
    if (!prop) return;
    sessionStorage.setItem('createProductMode', 'edit');
    sessionStorage.setItem('createProductData', JSON.stringify(prop));
    navigate('them-hang');
}

function showToast(message, type) {
    if (!type) type = "success";
    var toast = document.getElementById("toastNotification");
    var toastMsg = document.getElementById("toastMessage");
    var toastIcon = document.getElementById("toastIcon");

    toastMsg.innerText = message;

    if (type === "success") {
        toastIcon.innerHTML = '<i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-400"></i>';
    } else {
        toastIcon.innerHTML = '<i data-lucide="alert-circle" class="w-4 h-4 text-rose-500"></i>';
    }

    lucide.createIcons();

    toast.classList.remove("translate-y-20", "opacity-0");
    toast.classList.add("translate-y-0", "opacity-100");

    setTimeout(function() {
        toast.classList.remove("translate-y-0", "opacity-100");
        toast.classList.add("translate-y-20", "opacity-0");
    }, 2500);
}

</script>
