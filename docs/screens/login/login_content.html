<!-- PAGE: Đăng nhập -->
<style>
    body { font-family: 'Inter', sans-serif; }
</style>

<main class="flex-1 flex flex-col items-center justify-center px-4 sm:px-6 lg:px-8 py-12">
    <div class="w-full max-w-[440px] space-y-6">
        
        <div class="flex flex-col items-center text-center space-y-2">
            <div class="h-10 w-10 rounded-xl bg-[#2563EB] flex items-center justify-center text-white shadow-soft">
                <i data-lucide="layers" class="w-5 h-5"></i>
            </div>
            <h1 class="text-[32px] font-semibold tracking-tight text-[#0F172A] mt-2">Chào mừng trở lại</h1>
            <p class="text-[14px] text-[#64748B]">Đăng nhập để quản lý bảng điều khiển</p>
        </div>

        <div id="server-error-banner" class="hidden bg-red-50 border border-red-200 rounded-[12px] p-4 transition-all duration-150">
            <div class="flex items-start gap-3">
                <i data-lucide="alert-circle" class="w-5 h-5 text-[#DC2626] shrink-0 mt-0.5"></i>
                <div class="space-y-1">
                    <h4 class="text-[14px] font-medium text-[#DC2626]">Kết nối thất bại</h4>
                    <p class="text-[12px] text-red-700">Không thể đăng nhập. Vui lòng thử lại.</p>
                </div>
            </div>
        </div>

        <div id="auth-card" class="bg-white border border-[#E2E8F0] rounded-[16px] p-8 shadow-soft transition-all duration-150">
            <form id="login-form" class="space-y-5" novalidate>
                
                <div class="space-y-1.5">
                    <label for="username" class="text-[14px] font-medium text-[#0F172A]">Tên đăng nhập</label>
                    <div class="relative">
                        <input 
                            type="text" 
                            id="username" 
                            name="username"
                            placeholder="Nhập tên đăng nhập"
                            class="w-full h-11 px-3.5 bg-white border border-[#E2E8F0] rounded-[10px] text-[14px] text-[#0F172A] placeholder-[#64748B] focus:outline-none focus:border-[#2563EB] focus:ring-1 focus:ring-[#2563EB] transition-all duration-150"
                        >
                    </div>
                    <p id="username-error" class="hidden text-[12px] text-[#DC2626] flex items-center gap-1 mt-1">
                        <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> Trường bắt buộc
                    </p>
                </div>

                <div class="space-y-1.5">
                    <div class="flex justify-between items-center">
                        <label for="password" class="text-[14px] font-medium text-[#0F172A]">Mật khẩu</label>
                        <a href="#" id="forgot-password-link" class="text-[12px] font-medium text-[#2563EB] hover:underline">Quên mật khẩu?</a>
                    </div>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password"
                            placeholder="••••••••"
                            class="w-full h-11 px-3.5 bg-white border border-[#E2E8F0] rounded-[10px] text-[14px] text-[#0F172A] placeholder-[#64748B] focus:outline-none focus:border-[#2563EB] focus:ring-1 focus:ring-[#2563EB] transition-all duration-150"
                        >
                    </div>
                    <p id="password-error" class="hidden text-[12px] text-[#DC2626] flex items-center gap-1 mt-1">
                        <i data-lucide="alert-triangle" class="w-3.5 h-3.5"></i> Trường bắt buộc
                    </p>
                </div>

                <div class="flex items-center">
                    <input 
                        type="checkbox" 
                        id="remember-me" 
                        name="remember-me"
                        class="h-4 w-4 rounded border-[#E2E8F0] text-[#2563EB] focus:ring-[#2563EB] transition-all duration-150"
                    >
                    <label for="remember-me" class="ml-2 text-[14px] text-[#64748B] select-none">Ghi nhớ đăng nhập</label>
                </div>

                <div id="credential-error" class="hidden bg-red-50 border border-red-100 rounded-[10px] p-3 text-[12px] text-[#DC2626] flex items-center gap-2 transition-all duration-150">
                    <i data-lucide="shield-alert" class="w-4 h-4 shrink-0"></i>
                    <span>Tên đăng nhập hoặc mật khẩu không đúng</span>
                </div>

                <button 
                    type="submit" 
                    id="submit-button"
                    class="w-full h-11 bg-[#2563EB] hover:bg-blue-700 active:bg-blue-800 text-white font-medium text-[14px] rounded-[12px] shadow-sm flex items-center justify-center gap-2 transition-all duration-150"
                >
                    <span id="btn-text">Đăng nhập</span>
                    <div id="btn-spinner" class="hidden w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                </button>
            </form>
        </div>

        <p class="text-center text-[12px] text-[#64748B]">
            Chưa có tài khoản? <a href="#" class="font-medium text-[#2563EB] hover:underline">Liên hệ quản trị viên</a>
        </p>
    </div>
</main>

<footer class="py-4 text-center text-[12px] text-[#64748B] border-t border-[#E2E8F0] bg-white shrink-0">
    Cổng thông tin doanh nghiệp © 2026.
</footer>

<script>
(function() {
    const form = document.getElementById('login-form');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const submitBtn = document.getElementById('submit-button');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');

    const usernameError = document.getElementById('username-error');
    const passwordError = document.getElementById('password-error');
    const credentialError = document.getElementById('credential-error');
    const serverErrorBanner = document.getElementById('server-error-banner');

    function handleInputChange(field) {
        credentialError.classList.add('hidden');
        serverErrorBanner.classList.add('hidden');
        
        if (field === 'username') {
            usernameInput.classList.remove('border-[#DC2626]', 'focus:ring-[#DC2626]', 'focus:border-[#DC2626]');
            usernameError.classList.add('hidden');
        }
        if (field === 'password') {
            passwordInput.classList.remove('border-[#DC2626]', 'focus:ring-[#DC2626]', 'focus:border-[#DC2626]');
            passwordError.classList.add('hidden');
        }
    }

    function resetErrors() {
        usernameError.classList.add('hidden');
        passwordError.classList.add('hidden');
        credentialError.classList.add('hidden');
        serverErrorBanner.classList.add('hidden');
        usernameInput.classList.remove('border-[#DC2626]', 'focus:ring-[#DC2626]', 'focus:border-[#DC2626]');
        passwordInput.classList.remove('border-[#DC2626]', 'focus:ring-[#DC2626]', 'focus:border-[#DC2626]');
    }

    function disableForm() {
        usernameInput.disabled = true;
        passwordInput.disabled = true;
        submitBtn.disabled = true;
        submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
    }

    function enableForm() {
        usernameInput.disabled = false;
        passwordInput.disabled = false;
        submitBtn.disabled = false;
        submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        btnText.innerText = "Đăng nhập";
        btnSpinner.classList.add('hidden');
    }

    function handleFormSubmit(e) {
        e.preventDefault();
        resetErrors();

        const uVal = usernameInput.value.trim();
        const pVal = passwordInput.value.trim();

        let hasError = false;
        if (!uVal) {
            usernameInput.classList.add('border-[#DC2626]', 'focus:ring-[#DC2626]', 'focus:border-[#DC2626]');
            usernameError.classList.remove('hidden');
            hasError = true;
        }
        if (!pVal) {
            passwordInput.classList.add('border-[#DC2626]', 'focus:ring-[#DC2626]', 'focus:border-[#DC2626]');
            passwordError.classList.remove('hidden');
            hasError = true;
        }

        if (hasError) return;

        disableForm();
        btnText.innerText = "Đang đăng nhập...";
        btnSpinner.classList.remove('hidden');

        setTimeout(() => {
            enableForm();
            usernameInput.value = '';
            passwordInput.value = '';
            navigate('trang-chu');
        }, 1000);
    }

    form.addEventListener('submit', handleFormSubmit);
    usernameInput.addEventListener('input', () => handleInputChange('username'));
    passwordInput.addEventListener('input', () => handleInputChange('password'));
    document.getElementById('forgot-password-link').addEventListener('click', (e) => {
        e.preventDefault();
        navigate('quen-mat-khau');
    });
})();
</script>
